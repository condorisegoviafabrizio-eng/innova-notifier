name: Innova Notifier Cloud

on:
  schedule:
    - cron: '*/30 * * * *'  # Corre cada 30 minutos
  workflow_dispatch:      # Permite correrlo a mano

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 python-dotenv

      - name: Run Notifier
        env:
          INNOVA_EMAIL: ${{ secrets.INNOVA_EMAIL }}
          INNOVA_PASSWORD: ${{ secrets.INNOVA_PASSWORD }}
          WHATSAPP_NUMBER: ${{ secrets.WHATSAPP_NUMBER }}
          CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
        run: python cloud_monitor.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mensajes_vistos.json historial_mensajes.json index.html
          git commit -m "Update dashboard and seen messages [skip ci]" || echo "No changes to commit"
          git push
